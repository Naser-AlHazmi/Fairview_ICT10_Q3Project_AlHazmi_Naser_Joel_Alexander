<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="utf-8" />

    <meta name="viewport" content="width=device-width,initial-scale=1" />

    <title>Intramurals Team Checker</title>

    <link rel="stylesheet" href="https://pyscript.net/releases/2025.8.1/core.css" />

    <script type="module" src="https://pyscript.net/releases/2025.8.1/core.js"></script>

     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <style>

        body {

            background-image: linear-gradient(#323232, #00000000); background-repeat: no-repeat; background-size: cover;

        }

        .bck {

            background-color: rgba(255, 255, 255, 0.5);

            padding: 20px;

            border-radius: 5px;

            width: 1000px;

        }

        .bck2 {

            background-color: rgb(0, 0, 0, 0.5);

            padding: 20px;

            border-radius: 5px;

            text-align: center;

        }

        .bck3 {

            background-color: rgba(0, 7, 195, 0.3);

            padding: 10px;

            border-radius: 5px;

            text-align: left;

        }

    </style>

</head>

<body class="container mt-4"> 
    
    <script type="py" src="Main2.py"></script>

    <nav class="navbar navbar-expand-md bg-dark navbar-dark fixed-top">
		
		<div class="container-fluid">
			
			<h5 class="navbar-brand mb-0 h1">Intramurals SY 2025-2026</h5>

			<div class="collapse navbar-collapse">
				
				<ul class="navbar-nav ms-auto d-flex align-items-right">
					
					<li class="nav-item">
						
						<a class="nav-link" href="index.html"><button class="btn btn-outline-light">Signup/Signin</button></a>

					</li>

					<li class="nav-item">
						
						<a class="nav-link" href="team.html"><button class="btn btn-outline-light">Team Checker</button></a>

					</li>

					<li class="nav-item">
						
						<a class="nav-link" href="list.html"><button class="btn btn-outline-light">Players List</button></a>

					</li>

				</ul>

			</div>

		</div>

	</nav>

    <br><br>

    <center>

        <div class="container mt-4">

            <div class="bck2">

                <form>

                    <center> 

                        <div class="bck">

                            <h1 class="mb-4 text-white" style="font-style: italic;">Intramurals Team Checker</h1>

                        </div>

                    </center>

                    <br><br><br>

                    <div class="bck3">

                        <label for="username" class="form-label text-white">Are you done with your online registration?</label>

                        <br>

                        <div>

                            <label for="student1_denied" class="form-label text-white">No</label> <!-- Radio button for "No" -->

                            <input type="radio" id="student1_denied" name="r1" value="denied1">

                            <label for="student1_access" class="form-label text-white">Yes</label> <!-- Radio button for "Yes" -->

                            <input type="radio" id="student1_access" name="r1" value="access1">

                        </div>

                    </div>

                    <br><br><br>

                    <div class="bck3">

                        <label for="username" class="form-label text-white">Do you Have the medical clearance from the clinic?</label>

                        <br>

                        <div>

                            <label for="username" class="form-label text-white">No</label>

                            <input type="radio" id="student2_denied" name="r2" value="denied2"> <!-- Radio button for "No" -->

                            <label for="username" class="form-label text-white">Yes</label>

                            <input type="radio" id="student2_access" name="r2" value="access2"> <!-- Radio button for "Yes" -->

                        </div>

                    </div>

                    <br><br><br>

                    <select id="grade" class="form-select mb-3"> <!-- Dropdown for selecting grade level -->

                        <option value="" selected>Select Year Level</option>

                        <option value="Grade 10">Grade 10</option>

                    </select>

                   <select id="section" class="form-select mb-3"> <!-- Dropdown for selecting section -->

                        <option value="" selected>Select Section</option>

                        <option value="2">Emerald</option>

                        <option value="3">Sapphire</option>

                        <option value="4">Ruby</option>

                        <option value="1">Topaz</option>

                    </select>

                </form>

                <button type="submit" id="btn1" class="btn btn-primary mb-3" py-click="sign">Sign up</button> <!-- Button to submit the form and execute python-->

                <div id="output1" class="text-white"></div>

            </div>

        </div>

    </center>

</body>

</html>
